<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask 诊断工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .status.success {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .status.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .status.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        .status.info {
            background: #d1ecf1;
            border-left-color: #0c5460;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .step {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        .step h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        ul {
            margin-left: 20px;
            margin-top: 10px;
        }
        li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 MetaMask 诊断工具</h1>

        <div id="results">
            <div class="status info">
                <h3>📋 开始诊断...</h3>
                <p>点击下方按钮开始诊断 MetaMask 安装状态</p>
            </div>
        </div>

        <button onclick="runDiagnostics()">🔍 运行诊断</button>
        <button onclick="openMetaMaskDownload()" style="display: none;" id="downloadBtn">📥 下载 MetaMask</button>
        <button onclick="reloadPage()" style="display: none;" id="reloadBtn">🔄 刷新页面</button>
    </div>

    <script>
        function runDiagnostics() {
            const resultsDiv = document.getElementById('results');
            let html = '';

            // 检查 1: 浏览器信息
            html += `
                <div class="status info">
                    <h3>🌐 浏览器信息</h3>
                    <p><strong>浏览器:</strong> ${navigator.userAgent}</p>
                    <p><strong>平台:</strong> ${navigator.platform}</p>
                </div>
            `;

            // 检查 2: window.ethereum 对象
            if (typeof window.ethereum === 'undefined') {
                html += `
                    <div class="status error">
                        <h3>❌ MetaMask 未检测到</h3>
                        <p><strong>问题:</strong> 浏览器中没有安装 MetaMask 扩展</p>
                        <p><strong>window.ethereum:</strong> undefined</p>
                    </div>
                `;

                // 提供解决方案
                html += `
                    <div class="step">
                        <h3>🔧 解决方案:</h3>
                        <ol>
                            <li><strong>确认浏览器:</strong> 确保使用 Chrome、Firefox、Brave 或 Edge 浏览器</li>
                            <li><strong>安装 MetaMask:</strong>
                                <ul>
                                    <li>访问: <a href="https://metamask.io" target="_blank">https://metamask.io</a></li>
                                    <li>点击 "Download" 按钮</li>
                                    <li>选择对应的浏览器安装扩展</li>
                                </ul>
                            </li>
                            <li><strong>重启浏览器:</strong> 安装后完全关闭并重新打开浏览器</li>
                            <li><strong>创建钱包:</strong> 首次使用需要创建或导入钱包</li>
                            <li><strong>解锁钱包:</strong> 点击浏览器扩展图标并输入密码解锁</li>
                            <li><strong>刷新此页面</strong> 重新运行诊断</li>
                        </ol>
                    </div>
                `;

                document.getElementById('downloadBtn').style.display = 'block';
            } else {
                html += `
                    <div class="status success">
                        <h3>✅ MetaMask 已安装!</h3>
                        <p><strong>window.ethereum:</strong> 已检测到</p>
                        <p><strong>isMetaMask:</strong> ${window.ethereum.isMetaMask}</p>
                    </div>
                `;

                // 检查是否已解锁
                checkWalletStatus(html);
            }

            resultsDiv.innerHTML = html;
        }

        async function checkWalletStatus(html) {
            const resultsDiv = document.getElementById('results');

            try {
                // 检查是否已授权
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });

                if (accounts.length === 0) {
                    html += `
                        <div class="status warning">
                            <h3>⚠️ MetaMask 已安装但未连接</h3>
                            <p><strong>状态:</strong> MetaMask 需要授权连接</p>
                            <p><strong>账户:</strong> 未检测到</p>
                        </div>
                    `;

                    html += `
                        <div class="step">
                            <h3>🔧 解决方案:</h3>
                            <ol>
                                <li>点击浏览器工具栏中的 MetaMask 图标 (🦊 狐狸图标)</li>
                                <li>如果显示 "锁定"，输入密码解锁钱包</li>
                                <li>如果已解锁，点击页面上的 "连接" 按钮</li>
                                <li>刷新此页面重新测试</li>
                            </ol>
                        </div>
                    `;

                    // 添加连接按钮
                    html += `<button onclick="connectWallet()">🔗 连接 MetaMask</button>`;
                } else {
                    html += `
                        <div class="status success">
                            <h3>✅ MetaMask 已连接!</h3>
                            <p><strong>当前账户:</strong> <code>${accounts[0]}</code></p>
                            <p><strong>状态:</strong> 已授权</p>
                        </div>
                    `;

                    // 检查网络
                    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                    const networkNames = {
                        '0x1': 'Ethereum Mainnet',
                        '0x5': 'Goerli Testnet',
                        '0x1691': 'Ganache (5777)',
                        '0x539': 'Ganache (1337)'
                    };

                    const networkName = networkNames[chainId] || `Unknown (${chainId})`;

                    if (chainId === '0x1691' || chainId === '0x539') {
                        html += `
                            <div class="status success">
                                <h3>✅ 网络配置正确!</h3>
                                <p><strong>Chain ID:</strong> ${parseInt(chainId, 16)}</p>
                                <p><strong>网络:</strong> ${networkName}</p>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="status warning">
                                <h3>⚠️ 网络不匹配</h3>
                                <p><strong>当前网络:</strong> ${networkName} (Chain ID: ${parseInt(chainId, 16)})</p>
                                <p><strong>需要网络:</strong> Ganache (Chain ID: 5777)</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                html += `
                    <div class="status error">
                        <h3>❌ 检查失败</h3>
                        <p><strong>错误:</strong> ${error.message}</p>
                    </div>
                `;
            }

            resultsDiv.innerHTML = html;
        }

        async function connectWallet() {
            try {
                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });
                alert('✅ 连接成功! 账户: ' + accounts[0]);
                runDiagnostics();
            } catch (error) {
                alert('❌ 连接失败: ' + error.message);
            }
        }

        function openMetaMaskDownload() {
            window.open('https://metamask.io', '_blank');
        }

        function reloadPage() {
            location.reload();
        }
    </script>
</body>
</html>
